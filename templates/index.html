<!DOCTYPE html>
<html>
<head>
    <title>Webhook 控制台</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 300px; margin: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>Webhook 極速控制台</h1>
    <input type="text" id="url" placeholder="貼上 Webhook URL"><br>
    <input type="text" id="id" placeholder="貼上使用者 ID"><br>
    <button class="start" onclick="control('start')">開始轟炸</button>
    <button class="stop" onclick="control('stop')">停止</button>

    <script>
        function control(action) {
            const url = document.getElementById('url').value;
            const id = document.getElementById('id').value;
            fetch('/' + action, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url, id: id})
            }).then(res => res.json()).then(data => alert(action + " 成功！"));
        }
    </script>
</body>
</html>
